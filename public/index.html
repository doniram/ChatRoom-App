<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>ChatRoom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- LANDING -->
<div id="screen-landing" class="screen">
  <div class="landing-bg">
    <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
  </div>
  <div class="landing-card">
    <div class="logo-icon">💬</div>
    <h1 class="logo-title">ChatRoom App</h1>
    <p class="logo-sub">Chat real-time bareng teman!</p>
    <div class="landing-actions">
      <button class="btn-primary" onclick="showScreen('screen-create')"><span>✦</span> Buat Room Baru</button>
      <button class="btn-secondary" onclick="showScreen('screen-join')"><span>→</span> Masuk Room</button>
    </div>
  </div>
</div>

<!-- CREATE -->
<div id="screen-create" class="screen">
  <div class="auth-container">
    <button class="back-btn" onclick="showScreen('screen-landing')">← Kembali</button>
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-emoji">🏠</div>
        <h2>Buat Room Baru</h2>
        <p>Room aktif 24 jam sejak aktivitas terakhir</p>
      </div>
      <div class="form-group">
        <label>ID Room <span class="hint">(maks. 16 karakter)</span></label>
        <div class="input-row">
          <input type="text" id="create-roomid" maxlength="16" placeholder="Contoh: Roomsec" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
          <button class="btn-gen" onclick="generateRoomId()" type="button">🎲</button>
        </div>
      </div>
      <div class="form-group">
        <label>Username <span class="hint">(maks. 16 karakter)</span></label>
        <input type="text" id="create-username" maxlength="16" placeholder="Contoh: Alan" autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>
      <div class="form-group">
        <label>Password Room</label>
        <div class="input-row">
          <input type="password" id="create-password" placeholder="Min. 4 karakter" autocomplete="new-password"/>
          <button class="btn-eye" onclick="togglePassword('create-password')" type="button">👁</button>
        </div>
      </div>
      <div id="create-error" class="error-msg hidden"></div>
      <button class="btn-primary full" onclick="createRoom()">
        <span id="create-loader" class="loader hidden"></span> Buat Room
      </button>
    </div>
  </div>
</div>

<!-- JOIN -->
<div id="screen-join" class="screen">
  <div class="auth-container">
    <button class="back-btn" onclick="showScreen('screen-landing')">← Kembali</button>
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-emoji">🚪</div>
        <h2>Masuk Room</h2>
        <p>Bergabung ke room yang sudah ada</p>
      </div>
      <div class="form-group">
        <label>ID Room</label>
        <input type="text" id="join-roomid" maxlength="16" placeholder="Masukkan ID room" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
      </div>
      <div class="form-group">
        <label>Username <span class="hint">(maks. 16 karakter)</span></label>
        <input type="text" id="join-username" maxlength="16" placeholder="Pilih username unik" autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>
      <div class="form-group">
        <label>Password Room</label>
        <div class="input-row">
          <input type="password" id="join-password" placeholder="Password room" autocomplete="current-password"/>
          <button class="btn-eye" onclick="togglePassword('join-password')" type="button">👁</button>
        </div>
      </div>
      <div id="join-error" class="error-msg hidden"></div>
      <button class="btn-primary full" onclick="joinRoom()">
        <span id="join-loader" class="loader hidden"></span> Masuk Room
      </button>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="screen-chat" class="screen">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="room-avatar">🏠</div>
      <div>
        <div class="room-name" id="header-room-name">Room #0000</div>
        <div class="room-status" id="header-online-count">1 online</div>
      </div>
    </div>
    <div class="chat-header-right">
      <div class="room-timer" id="room-timer"></div>
      <button class="icon-btn" onclick="toggleUserPanel()" id="toggle-users-btn" title="Pengguna online">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </button>
      <button class="btn-logout" onclick="logout()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="logout-text">Keluar</span>
      </button>
    </div>
  </div>

  <!-- Body -->
  <div class="chat-body">
    <div class="messages-area" id="messages-area">
      <div class="chat-welcome">
        <div class="welcome-icon">🎉</div>
        <p>Selamat datang di room!<br>Mulai ngobrol sekarang.</p>
      </div>
    </div>
    <div class="user-panel" id="user-panel">
      <div class="user-panel-header">
        <h3>👥 Online Sekarang</h3>
        <button class="close-panel" onclick="toggleUserPanel()">✕</button>
      </div>
      <ul class="user-list" id="user-list"></ul>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <div class="edit-indicator hidden" id="edit-indicator">
      <span>✏️ Mode Edit</span>
      <button onclick="cancelEdit()" type="button">✕</button>
    </div>
    <div class="input-row-chat">

      <!-- Attach button + popup menu -->
      <div class="attach-wrap">
        <button class="attach-btn" id="attach-btn" onclick="toggleAttachMenu()" type="button" title="Lampirkan file">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <div class="attach-menu" id="attach-menu">
          <button class="attach-option" onclick="triggerImageUpload()" type="button">
            <span class="attach-opt-icon" style="background:rgba(37,211,102,.15);color:#25d366">🖼️</span>
            <span>Foto / Gambar</span>
          </button>
          <button class="attach-option" onclick="triggerDocUpload()" type="button">
            <span class="attach-opt-icon" style="background:rgba(74,158,255,.15);color:#4a9eff">📄</span>
            <span>Dokumen</span>
          </button>
        </div>
      </div>

      <!-- Hidden file inputs -->
      <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleFileSelect(event,'image')"/>
      <input type="file" id="doc-input"   accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.zip,.json" style="display:none" onchange="handleFileSelect(event,'doc')"/>

      <textarea id="message-input" placeholder="Ketik pesan..." rows="1"
        onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>

      <button class="send-btn" onclick="sendMessage()" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu hidden" id="context-menu">
  <button id="ctx-edit" onclick="contextEdit()">✏️ Edit Pesan</button>
  <button onclick="contextDelete()">🗑️ Hapus Pesan</button>
  <button class="ctx-cancel" onclick="hideContextMenu()">✕ Batal</button>
</div>

<!-- Lightbox -->
<div class="lightbox hidden" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-body"><img id="lightbox-img" src="" alt="Foto"/></div>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
